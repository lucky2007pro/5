{% extends 'base.html' %}

{% block title %}Delete Review{% endblock %}

{% block content %}
<div class="card" style="max-width: 720px; margin: 0 auto;">
    <h1>Delete review</h1>
    <p>Are you sure you want to delete this review?</p>
    <form method="post">
        {% csrf_token %}
        <div class="actions">
            <button class="btn btn-danger" type="submit">Yes, delete</button>
        </div>
    </form>
</div>
{% endblock %}
