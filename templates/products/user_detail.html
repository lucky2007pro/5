{% extends 'base.html' %}

{% block title %}{{ object.full_name }}{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>{{ object.full_name }}</h1>
        <p class="muted">User details page.</p>
    </div>
    <div class="actions">
        <a class="btn btn-outline" href="{% url 'product_list' %}">Back</a>
        <a class="btn btn-primary" href="{% url 'user_update' object.pk %}">Edit</a>
    </div>
</div>

<div class="card">
    <ul class="field-list">
        <li><strong>Full name:</strong> {{ object.full_name }}</li>
        <li><strong>Year of birth:</strong> {{ object.year_of_birth }}</li>
        <li><strong>Username:</strong> @{{ object.username }}</li>
    </ul>
</div>
{% endblock %}
