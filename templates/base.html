<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shop{% endblock %}</title>
    <style>
        :root {
            --bg: #f6f8fc;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --danger: #dc2626;
            --border: #e5e7eb;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .container {
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto;
        }
        .navbar {
            background: #111827;
            color: white;
            padding: 16px 0;
            margin-bottom: 24px;
        }
        .navbar-inner {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .brand {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
        }
        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .nav-links a, .btn {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid transparent;
        }
        .nav-links a {
            color: white;
            background: rgba(255,255,255,0.08);
        }
        .nav-links a:hover { background: rgba(255,255,255,0.16); text-decoration: none; }
        .page {
            padding-bottom: 48px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }
        .muted { color: var(--muted); }
        .btn {
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover { background: var(--primary-dark); text-decoration: none; }
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-outline {
            border-color: var(--border);
            background: white;
            color: var(--text);
        }
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 999px;
            background: #e0e7ff;
            color: #3730a3;
            font-size: 12px;
            font-weight: 700;
        }
        .table-like {
            display: grid;
            gap: 12px;
        }
        .field-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            gap: 10px;
        }
        .field-list li {
            padding: 12px 14px;
            background: #f9fafb;
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        form p { margin-bottom: 14px; }
        form input, form select, form textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font: inherit;
        }
        form textarea { min-height: 120px; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .image-box img {
            max-width: 100%;
            border-radius: 14px;
            display: block;
        }
        footer {
            padding: 24px 0 36px;
            color: var(--muted);
            text-align: center;
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="container navbar-inner">
            <a class="brand" href="{% url 'product_list' %}">Django Shop</a>
            <nav class="nav-links">
                <a href="{% url 'product_list' %}">Products</a>
                <a href="{% url 'product_create' %}">Add Product</a>
                <a href="{% url 'category_create' %}">Add Category</a>
                <a href="{% url 'user_create' %}">Add User</a>
            </nav>
        </div>
    </header>

    <main class="container page">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">Simple Django CRUD templates</div>
    </footer>
</body>
</html>
